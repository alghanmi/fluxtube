name = "fluxtube-dashboard"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Enable the workers.dev subdomain for local + preview visibility. Production
# routes traffic through the (Terraform-injected) dashboard host's `/api/*`
# via a Service Binding from the Pages project вЂ” wired up in Phase 7.
workers_dev = true

# в”Ђв”Ђ Build-time string substitution в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# wrangler replaces the bare identifier `VERSION` in the bundle at build time.
# The deploy workflow overrides this with the version from the project root
# `package.json`. The value here is the default for `wrangler dev` and the
# cloudflare/vitest-pool-workers test bundle.
[define]
VERSION = "\"0.0.0-dev\""

# в”Ђв”Ђ Cron trigger (nightly R2 backup) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Phase 5 adds the `scheduled` handler + backup logic. Offset from the sync
# worker's `*/30 * * * *` schedule to avoid CPU contention on tick boundaries.
[triggers]
crons = ["15 4 * * *"]

# в”Ђв”Ђ R2 binding (nightly backups, Phase 5) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Terraform creates the real bucket in Phase 7 with a 120-day lifecycle rule
# and injects the actual `bucket_name` at deploy time. The placeholder below
# is a per-project literal that wrangler dev can parse; production overrides
# via the `r2_bucket_binding` block on `cloudflare_workers_script`.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "fluxtube-backups-placeholder"

# в”Ђв”Ђ D1 binding (shared with sync worker) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Same D1 database as workers/sync вЂ” Terraform sets the real binding via
# `d1_database_binding` on this script's `cloudflare_workers_script` resource
# in Phase 7. The value below is an all-zeros placeholder so wrangler dev
# parses; production deploys ignore it (real UUID injected by Terraform).
#
# `migrations_dir` points at the sync worker's migrations folder so both
# workers share the same migration ledger.
[[d1_databases]]
binding = "DB"
database_name = "fluxtube"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../sync/migrations"

# в”Ђв”Ђ Logs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[observability]
enabled = true
