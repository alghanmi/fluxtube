version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    groups:
      dev-dependencies:
        dependency-type: 'development'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
    # TypeScript major bumps need a coordinated upgrade across every
    # workspace (root, workers/sync, workers/dashboard, dashboard,
    # site, scripts) plus a review of tsconfig + libcheck output.
    # Dedicated PRs for those; weekly Dependabot bumps stay on the
    # current major.
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'npm'
    directory: '/workers/sync'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'npm'
    directory: '/scripts'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(actions)'

  - package-ecosystem: 'terraform'
    directory: '/infrastructure/terraform/environments/production'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(terraform)'

  - package-ecosystem: 'terraform'
    directory: '/infrastructure/terraform/_modules/fluxtube-environment'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(terraform)'
