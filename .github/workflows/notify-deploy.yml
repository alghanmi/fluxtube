name: Notify deploy

# Fires a repository_dispatch event at alghanmi/fluxtube-deploy whenever a
# release is published in this repo. The dispatch payload carries the
# version, commit sha, actor, and ref so the deploy workflow can stamp
# metrics + log lines with attribution back to the public release.
#
# Auth: secrets.DEPLOY_DISPATCH_TOKEN — a fine-scoped PAT with
# `repository_dispatch:write` on alghanmi/fluxtube-deploy ONLY. This is
# the entire auth surface this public repo holds. Compromise would let an
# attacker fire a redeploy of an already-released version; it cannot push
# arbitrary code (that requires merging on this repo).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch deploy-release event
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          # Strip leading "v" so the version stamped onto metrics is "0.1.0",
          # not "v0.1.0". The ref keeps the v-prefixed form for git operations.
          version="${TAG#v}"
          gh api repos/alghanmi/fluxtube-deploy/dispatches \
            -f event_type=deploy-release \
            -f "client_payload[version]=${version}" \
            -f "client_payload[sha]=${SHA}" \
            -f "client_payload[actor]=${ACTOR}" \
            -f "client_payload[ref]=${TAG}"
          {
            echo "### Dispatched deploy-release"
            echo "- version: \`${version}\`"
            echo "- ref: \`${TAG}\`"
            echo "- sha: \`${SHA}\`"
            echo "- actor: @${ACTOR}"
            echo "- target: alghanmi/fluxtube-deploy"
          } >> "$GITHUB_STEP_SUMMARY"
