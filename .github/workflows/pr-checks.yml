name: PR checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @fluxtube/sync typecheck

      - name: Lint
        run: pnpm --filter @fluxtube/sync lint

      - name: Test
        run: pnpm --filter @fluxtube/sync test

      # npm registry retired /security/audits/quick and its fallback endpoint
      # (both return HTTP 410) so `pnpm audit` in current pnpm builds fails
      # unconditionally in CI. Dependabot's `vulnerability-alerts` +
      # `automated-security-fixes` (enabled at the repo level) surface HIGH+
      # CVEs continuously and open auto-PRs to fix them, which is a strictly
      # better signal than a per-PR audit blip. Keeping the step marked
      # `continue-on-error` so future pnpm releases that adopt the new
      # `/security/advisories/bulk` endpoint start feeding CI output again
      # without breaking every PR in the meantime.
      - name: Audit dependencies
        continue-on-error: true
        run: pnpm audit --audit-level=high
